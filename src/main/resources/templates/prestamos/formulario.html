<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario Préstamo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-dark text-white">

            <h3 class="mb-0">Formulario de Préstamo</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/prestamos/guardar}"
                  th:object="${prestamo}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <!-- Usuario -->
                <div class="mb-3">

                    <label class="form-label">Usuario</label>

                    <select class="form-select"
                            th:field="*{usuario}">

                        <option value="">Seleccione...</option>

                        <option th:each="u : ${usuarios}"
                                th:value="${u.id}"
                                th:text="${u.nombre}">
                        </option>

                    </select>

                </div>

                <!-- Fecha préstamo -->
                <div class="mb-3">

                    <label class="form-label">Fecha Préstamo</label>

                    <input type="date"
                           class="form-control"
                           th:field="*{fechaPrestamo}">

                </div>

                <!-- Fecha devolución -->
                <div class="mb-3">

                    <label class="form-label">Fecha Devolución</label>

                    <input type="date"
                           class="form-control"
                           th:field="*{fechaDevolucion}">

                </div>

                <!-- Estado -->
                <div class="mb-3">

                    <label class="form-label">Estado</label>

                    <select class="form-select"
                            th:field="*{estado}">

                        <option value="ACTIVO">ACTIVO</option>
                        <option value="DEVUELTO">DEVUELTO</option>
                        <option value="ATRASADO">ATRASADO</option>

                    </select>

                </div>

                <!-- Botones -->
                <div class="mt-4">

                    <button type="submit"
                            class="btn btn-success">
                        Guardar
                    </button>

                    <a th:href="@{/prestamos}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
