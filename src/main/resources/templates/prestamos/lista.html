<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Préstamos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Gestión de Préstamos</h2>

        <a th:href="@{/prestamos/nuevo}"
           class="btn btn-primary">
            Nuevo Préstamo
        </a>

    </div>

    <div class="mb-3">

        <a th:href="@{/}"
           class="btn btn-secondary">
            Inicio
        </a>

    </div>

    <div th:if="${success}"
         class="alert alert-success">

        <span th:text="${success}"></span>

    </div>

    <div th:if="${error}"
         class="alert alert-danger">

        <span th:text="${error}"></span>

    </div>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Usuario</th>

            <th>Fecha Préstamo</th>

            <th>Fecha Devolución</th>

            <th>Estado</th>

            <th>Acciones</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="prestamo : ${prestamos}">

            <td th:text="${prestamo.id}"></td>

            <td th:text="${prestamo.usuario.nombre}"></td>

            <td th:text="${prestamo.fechaPrestamo}"></td>

            <td th:text="${prestamo.fechaDevolucion}"></td>

            <td th:text="${prestamo.estado}"></td>

            <td>

                <a th:href="@{/prestamos/editar/{id}(id=${prestamo.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/prestamos/eliminar/{id}(id=${prestamo.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar préstamo?')">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
