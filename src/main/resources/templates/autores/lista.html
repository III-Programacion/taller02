<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Autores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Gestión de Autores</h2>

    <div class="mb-3">

        <a th:href="@{/}" class="btn btn-secondary">
            Inicio
        </a>

        <a th:href="@{/autores/nuevo}" class="btn btn-primary">
            Nuevo Autor
        </a>

    </div>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Nombre</th>

            <th>Acciones</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="autor : ${autores}">

            <td th:text="${autor.id}"></td>

            <td th:text="${autor.nombre}"></td>

            <td>

                <a th:href="@{/autores/editar/{id}(id=${autor.id})}"
                   class="btn btn-warning btn-sm">

                    Editar

                </a>

                <a th:href="@{/autores/eliminar/{id}(id=${autor.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar este autor?')">

                    Eliminar

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>

</html>
