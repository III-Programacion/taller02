<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario Libro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">Formulario de Libro</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/libros/guardar}"
                  th:object="${libro}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <!-- Título -->
                <div class="mb-3">

                    <label class="form-label">Título</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{titulo}">

                    <div class="text-danger"
                         th:errors="*{titulo}"></div>

                </div>

                <!-- ISBN -->
                <div class="mb-3">

                    <label class="form-label">ISBN</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{isbn}">

                    <div class="text-danger"
                         th:errors="*{isbn}"></div>

                </div>

                <!-- Año -->
                <div class="mb-3">

                    <label class="form-label">Año de publicación</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{anioPublicacion}">

                    <div class="text-danger"
                         th:errors="*{anioPublicacion}"></div>

                </div>

                <!-- Stock -->
                <div class="mb-3">

                    <label class="form-label">Stock</label>

                    <input type="number"
                           class="form-control"
                           th:field="*{stock}">

                    <div class="text-danger"
                         th:errors="*{stock}"></div>

                </div>

                <!-- Autor -->
                <div class="mb-3">

                    <label class="form-label">Autor</label>

                    <select class="form-select"
                            th:field="*{autor}">

                        <option value="">Seleccione...</option>

                        <option th:each="a : ${autores}"
                                th:value="${a.id}"
                                th:text="${a.nombre}">
                        </option>

                    </select>

                </div>

                <!-- Categoría -->
                <div class="mb-3">

                    <label class="form-label">Categoría</label>

                    <select class="form-select"
                            th:field="*{categoria}">

                        <option value="">Seleccione...</option>

                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>

                    </select>

                </div>

                <!-- Editorial -->
                <div class="mb-3">

                    <label class="form-label">Editorial</label>

                    <select class="form-select"
                            th:field="*{editorial}">

                        <option value="">Seleccione...</option>

                        <option th:each="e : ${editoriales}"
                                th:value="${e.id}"
                                th:text="${e.nombre}">
                        </option>

                    </select>

                </div>

                <!-- Botones -->
                <div class="mt-4">

                    <button type="submit"
                            class="btn btn-success">
                        Guardar
                    </button>

                    <a th:href="@{/libros}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>

</html>
