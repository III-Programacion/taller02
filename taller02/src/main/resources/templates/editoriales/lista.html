<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Editoriales</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <h2 class="mb-4">Gestión de Editoriales</h2>

    <div class="mb-3">

        <a th:href="@{/}" class="btn btn-secondary">Inicio</a>

        <a th:href="@{/editoriales/nuevo}" class="btn btn-primary">
            Nueva Editorial
        </a>

    </div>

    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Ciudad</th>
            <th width="180">Acciones</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="editorial : ${editoriales}">

            <td th:text="${editorial.id}"></td>
            <td th:text="${editorial.nombre}"></td>
            <td th:text="${editorial.ciudad}"></td>

            <td>

                <a th:href="@{/editoriales/editar/{id}(id=${editorial.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/editoriales/eliminar/{id}(id=${editorial.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar esta editorial?')">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
