<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Libros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>Gestión de Libros</h2>

        <a th:href="@{/libros/nuevo}"
           class="btn btn-primary">
            Nuevo Libro
        </a>

    </div>

    <div class="mb-3">

        <a th:href="@{/}"
           class="btn btn-secondary">
            Inicio
        </a>

    </div>

    <div th:if="${success}"
         class="alert alert-success">

        <span th:text="${success}"></span>

    </div>

    <div th:if="${error}"
         class="alert alert-danger">

        <span th:text="${error}"></span>

    </div>

    <table class="table table-striped table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>

            <th>Título</th>

            <th>ISBN</th>

            <th>Año</th>

            <th>Stock</th>

            <th>Autor</th>

            <th>Categoría</th>

            <th>Editorial</th>

            <th width="170">Acciones</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="libro : ${libros}">

            <td th:text="${libro.id}"></td>

            <td th:text="${libro.titulo}"></td>

            <td th:text="${libro.isbn}"></td>

            <td th:text="${libro.anioPublicacion}"></td>

            <td th:text="${libro.stock}"></td>

            <td th:text="${libro.autor.nombre}"></td>

            <td th:text="${libro.categoria.nombre}"></td>

            <td th:text="${libro.editorial.nombre}"></td>

            <td>

                <a class="btn btn-warning btn-sm"
                   th:href="@{/libros/editar/{id}(id=${libro.id})}">

                    Editar

                </a>

                <a class="btn btn-danger btn-sm"
                   th:href="@{/libros/eliminar/{id}(id=${libro.id})}"
                   onclick="return confirm('¿Está seguro de eliminar este libro?')">

                    Eliminar

                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
