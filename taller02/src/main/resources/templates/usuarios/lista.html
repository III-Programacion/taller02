<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between mb-3">

        <h2>Usuarios</h2>

        <a th:href="@{/usuarios/nuevo}" class="btn btn-primary">
            Nuevo Usuario
        </a>

    </div>

    <table class="table table-bordered">

        <thead class="table-dark">

        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="u : ${usuarios}">

            <td th:text="${u.id}"></td>
            <td th:text="${u.nombre}"></td>
            <td th:text="${u.cedula}"></td>
            <td th:text="${u.correo}"></td>
            <td th:text="${u.telefono}"></td>

            <td>

                <a th:href="@{/usuarios/editar/{id}(id=${u.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar usuario?')">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
