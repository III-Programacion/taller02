<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Formulario Usuario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-secondary text-white">

            <h3 class="mb-0">Formulario de Usuario</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/usuarios/guardar}"
                  th:object="${usuario}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <!-- NOMBRE -->
                <div class="mb-3">

                    <label class="form-label">Nombre</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}">

                    <div class="text-danger"
                         th:errors="*{nombre}"></div>

                </div>

                <!-- CÉDULA -->
                <div class="mb-3">

                    <label class="form-label">Cédula</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{cedula}">

                    <div class="text-danger"
                         th:errors="*{cedula}"></div>

                </div>

                <!-- CORREO -->
                <div class="mb-3">

                    <label class="form-label">Correo</label>

                    <input type="email"
                           class="form-control"
                           th:field="*{correo}">

                    <div class="text-danger"
                         th:errors="*{correo}"></div>

                </div>

                <!-- TELÉFONO -->
                <div class="mb-3">

                    <label class="form-label">Teléfono</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{telefono}">

                    <div class="text-danger"
                         th:errors="*{telefono}"></div>

                </div>

                <!-- BOTONES -->
                <div class="mt-4">

                    <button type="submit"
                            class="btn btn-success">
                        Guardar
                    </button>

                    <a th:href="@{/usuarios}"
                       class="btn btn-secondary">
                        Cancelar
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
